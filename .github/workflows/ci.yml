name: TechPulse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./techpulse-backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/test"
      JWT_SECRET: "test-secret"
      GROQ_API_KEY: "test-key"

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './techpulse-backend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Run Database Push
        run: npx prisma db push

      - name: Generate Prisma Client
        run: npx prisma generate
  
      - name: Run Lint
        run: npm run lint || echo "Linting skipped"
  
      - name: Run Tests
        run: npm test
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./techpulse-ui
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './techpulse-ui/package-lock.json'
      - name: Install dependencies
        run: npm install
      - name: Run Lint
        run: npm run lint || echo "Linting skipped"
      - name: Build
        run: npm run build
      - name: Run Tests
        run: npm test || echo "Tests skipped"
